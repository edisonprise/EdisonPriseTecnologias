<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EdisonPrise Tecnologias | Web & Data</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <header>
        <h1 id="titulo-principal">Cargando...</h1>
        <p>Soluciones digitales basadas en datos.</p>
    </header>

    <section id="servicios">
        <h2>Lo que hago por tu negocio</h2>
        <div id="contenedor-servicios" class="grid">
        </div>
    </section>

    <section id="proyectos">
        <h2>Análisis de Datos & Proyectos Web</h2>
        <div id="lista-proyectos"></div>
    </section>

    <section id="analisis-interactivo">
        <h2>Impacto de mis Proyectos</h2>
        <div style="position: relative; height:300px; width:100%; max-width:800px; margin: auto;"></div>
        <canvas id="graficaDesempeno"></canvas>
    </section>

    <section id="contacto">
        <h2>Sugerencias y Contacto</h2>
        <form id="survey-form" action="https://formspree.io/f/xeqywewj" method="POST">
            <label id="name-label" for="name">Nombre</label>
            <input id="name" type="text" placeholder="Tu nombre" required>

            <label id="email-label" for="email">Email</label>
            <input id="email" type="email" placeholder="Tu email" required>

            <label id="number-label" for="number">Edad (Opcional)</label>
            <input id="number" type="number" placeholder="Edad" min="7" max="99">

            <p>¿Qué servicio te interesa más?</p>
            <select id="dropdown" required>
                <option disabled selected value="">Selecciona una opción</option>
                <option value="web">Desarrollo Web</option>
                <option value="data">Análisis de Datos</option>
            </select>

            <p>¿Recomendarías EdisonPrise?</p>
            <label><input name="user-recommend" value="si" type="radio" checked> Definitivamente</label>
            <label><input name="user-recommend" value="tal vez" type="radio"> Tal vez</label>

            <p>Comentarios</p>
            <textarea id="comments" name="comments" rows="4" placeholder="Escribe aquí..."></textarea>

            <button id="submit" type="submit">Enviar Sugerencia</button>
        </form>
    </section>

    <script src="script.js"></script>
</body>

</html>
